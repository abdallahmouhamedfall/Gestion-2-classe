<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduClass — Enseignants</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/enseignants.css">  
</head>
<body>
<div id="dashboard">
  <div class="topbar"><div class="topbar-brand"><div class="topbar-icon">E</div> EduClass</div><div class="topbar-right"><div class="topbar-date" id="currentDate"></div><div class="avatar" onclick="logout()">AD</div></div></div>
  <div class="app-body">
    <nav class="sidebar">
      <div class="sidebar-section">Principal</div><div class="nav-item"><a href="dashboard.html"><span class="nav-icon">📊</span> Tableau de bord</a></div>
      <div class="sidebar-section">Académique</div><div class="nav-item"><a href="etudiants.html"><span class="nav-icon">🎓</span> Étudiants <span class="nav-badge">5</span></a></div>
      <div class="nav-item active"><a href="enseignants.html"><span class="nav-icon">👨‍🏫</span> Enseignants <span class="nav-badge">4</span></a></div>
      <div class="nav-item"><a href="seances.html"><span class="nav-icon">📅</span> Séances</a></div>
      <div class="sidebar-section">Gestion</div><div class="nav-item"><a href="notes.html"><span class="nav-icon">📝</span> Notes</a></div>
      <div class="nav-item"><a href="evaluations.html"><span class="nav-icon">📋</span> Évaluations</a></div>
      <div class="nav-item"><a href="planning.html"><span class="nav-icon">🗓️</span> Planning</a></div>
      <div class="nav-item"><a href="absences.html"><span class="nav-icon">⚠️</span> Absences <span class="nav-badge">5</span></a></div>
      <div class="sidebar-bottom"><button class="logout-btn" onclick="logout()">🚪 Déconnexion</button></div>
    </nav>
    <main class="main">
      <div class="page-header"><div><div class="page-title">Enseignants</div><div class="page-sub">Corps enseignant — 4 professeurs</div></div><button class="btn-primary" onclick="alert('Ajouter enseignant')">+ Ajouter enseignant</button></div>
      <div class="table-card">
        <div class="table-search"><input class="search-inp" id="searchInput" placeholder="🔍 Rechercher un enseignant..."><button class="icon-btn" onclick="alert('Filtre')">⚙️</button><button class="icon-btn" onclick="exportCSV()">📎</button></div>
        <table><thead><tr><th>Enseignant</th><th>Matière</th><th>Séances/sem.</th><th>Heures totales</th><th>Étudiants</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="tableBody"></tbody></table>
      </div>
    </main>
  </div>
</div>
<script>
  const enseignants = [
    { name: "M. Benali", initials: "MB", email: "m.benali@educlass.fr", matiere: "Mathématiques", matiereClass: "badge-green", seances: 6, heures: 48, etudiants: 5, status: "Présent", statusClass: "badge-green" },
    { name: "Mme Aïssaoui", initials: "KA", email: "k.aissaoui@educlass.fr", matiere: "Physique-Chimie", matiereClass: "badge-sky", seances: 5, heures: 40, etudiants: 5, status: "Présent", statusClass: "badge-green" },
    { name: "M. Dupont", initials: "DL", email: "d.dupont@educlass.fr", matiere: "Histoire-Géo", matiereClass: "badge-amber", seances: 4, heures: 32, etudiants: 5, status: "En congé", statusClass: "badge-amber" },
    { name: "Mme Nakache", initials: "NB", email: "n.nakache@educlass.fr", matiere: "Français", matiereClass: "badge-sky", seances: 5, heures: 40, etudiants: 5, status: "Présent", statusClass: "badge-green" }
  ];
  function renderTable(filter = "") {
    const tbody = document.getElementById("tableBody");
    const f = filter.toLowerCase();
    const filtered = enseignants.filter(e => e.name.toLowerCase().includes(f) || e.matiere.toLowerCase().includes(f));
    tbody.innerHTML = filtered.map(e => `
      <tr>
        <td><div class="td-user"><div class="avatar-sm">${e.initials}</div><div><div class="td-name">${e.name}</div><div class="td-email" style="font-size:11px;color:var(--text-muted)">${e.email}</div></div></div></td>
        <td><span class="badge ${e.matiereClass}">${e.matiere}</span></td>
        <td>${e.seances}</td><td>${e.heures}h</td><td>${e.etudiants}</td>
        <td><span class="badge ${e.statusClass}">${e.status}</span></td>
        <td><button class="icon-btn" onclick="alert('Voir ${e.name}')">👁</button><button class="icon-btn" onclick="alert('Modifier ${e.name}')">✏️</button></td>
      </tr>
    `).join("");
  }
  function exportCSV() { let csv = "Nom,Matière,Séances/sem.,Heures,Étudiants,Statut\n"; enseignants.forEach(e => csv += `${e.name},${e.matiere},${e.seances},${e.heures},${e.etudiants},${e.status}\n`); const blob = new Blob([csv], {type:"text/csv"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "enseignants.csv"; a.click(); URL.revokeObjectURL(a.href); }
  document.getElementById("searchInput").addEventListener("input", e => renderTable(e.target.value));
  function updateDate() { document.getElementById("currentDate").innerText = new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).replace(/^\w/, c => c.toUpperCase()); }
  function logout() { window.location.href = 'login.html'; }
  updateDate(); renderTable();
</script>
</body>
</html>
